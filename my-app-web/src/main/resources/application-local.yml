jeap:
  security:
    oauth2:
      resourceserver:
        authorization-server:
          issuer: "http://localhost:8081/oauth-context-path"
          jwk-set-uri: "${jeap.security.oauth2.resourceserver.authorization-server.issuer}/.well-known/jwks.json"
  swagger:
    status: OPEN
  monitor:
    prometheus:
      password: "{noop}secret"
  s3:
    client:
      endpoint-url: 'localhost:4566'
      access-key: 'unused'
      secret-key: 'unused'
      tls: false
      region: eu-central-2

#Store the client secret plain text for dev like environments
springdoc:
  swagger-ui:
    oauth:
      client-secret: secret

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    url: "jdbc:postgresql://localhost:5432/sample-db"
    username: db-user
    password: db-pass
    hikari:
      schema: data

frontend:
  auth:
    authority: ${jeap.security.oauth2.resourceserver.authorization-server.issuer}
    applicationUrl: http://localhost:8080${server.servlet.context-path}
    logoutRedirectUri: http://localhost:4199/
    mockPams: true
    pamsEnvironment: DEV
    tokenAwarePatterns:
      - "^${server.servlet.context-path}/api/.*" # build-prod
      - "^${frontend.auth.applicationUrl}/api/.*" # build-dev
      - "^${server.servlet.context-path}/ui-api/.*" # build-prod
      - "^${frontend.auth.applicationUrl}/ui-api/.*" # build-dev
    clientId: microService
    redirect-url: http://localhost:8080${server.servlet.context-path}/redirect
