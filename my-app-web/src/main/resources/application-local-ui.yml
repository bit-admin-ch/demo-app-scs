frontend:
  auth:
    authority: ${jeap.security.oauth2.resourceserver.authorization-server.issuer}
    applicationUrl: http://localhost:4200/
    logoutRedirectUri: http://localhost:4199/
    mockPams: true
    pamsEnvironment: DEV
    tokenAwarePatterns:
      - "^http://localhost:8080${server.servlet.context-path}/api/.*"
      - "^http://localhost:8080${server.servlet.context-path}/ui-api/.*"
    clientId: microService
    redirect-url: http://localhost:4200/
