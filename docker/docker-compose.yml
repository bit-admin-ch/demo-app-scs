---
services:
  postgres:
    image: postgres:17.7
    container_name: postgresql-db-local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=db-user
      - POSTGRES_PASSWORD=db-pass
      - POSTGRES_DB=sample-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db-user -d sample-db"]
      interval: 2s
      timeout: 5s
      retries: 15

  localstack: # https://hub.docker.com/r/localstack/localstack
    image: localstack/localstack:3.5.0
    container_name: localstack_object_storage
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
      - "8055:8080"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - PERSISTENCE=1 # DATA_DIR implicitly points to /var/lib/localstack/state if persistence is enabled. Use PERSISTENCE=1 to enable persistence. If DATA_DIR is set, its value is ignored, a warning is logged and PERSISTENCE is set to 1.
      - DEFAULT_REGION=eu-central-2
      - DISABLE_EVENTS=1
      - SKIP_INFRA_DOWNLOADS=1
      - SKIP_SSL_CERT_DOWNLOAD=1
    volumes:
      - "./localstack_data:/var/lib/localstack" # Mounts the local directory to the container
      - "/var/run/docker.sock:/var/run/docker.sock" # Mounts the docker socket
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 2s
      timeout: 5s
      retries: 15

  create-bucket:
    image: amazon/aws-cli:2.22.3
    container_name: create_s3_bucket
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=unused
      - AWS_SECRET_ACCESS_KEY=unused
    entrypoint: >
      /bin/sh -c "aws --endpoint-url=http://localstack:4566 s3api head-bucket --bucket bucket-name --region eu-central-2
      || aws --endpoint-url=http://localstack:4566 s3 mb s3://bucket-name --region eu-central-2"

  oauth-mock:
    build:
      context: ../oauth-mock-server
    container_name: oauth_mock_server
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local

  # The demo application itself. Started only with the "app" profile:
  #   docker compose --profile app up --build
  # During local development (application running in the IDE), start the stack
  # without the profile to get only the infrastructure services.
  my-app:
    build:
      context: ../my-app-web
    container_name: my_app
    profiles: ["app"]
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
      oauth-mock:
        condition: service_started
