name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright browser and system dependencies
        run: npx playwright@1.61.0 install --with-deps chromium

      - name: Build with Maven
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Build application Docker image
        run: docker build -t my-app:${{ github.sha }} my-app-web

      - name: Build OAuth mock server Docker image
        run: docker build -t my-app-oauth-mock:${{ github.sha }} oauth-mock-server
